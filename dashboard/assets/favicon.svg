<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Navy app-icon background, rounded corners -->
  <rect width="100" height="100" fill="#1B2D6B" rx="14"/>

  <!--
    Layout:
      Diamond symbol: top(50,4) right(87,40) bottom(50,64) left(13,40)
      Eye: centered at (50,40), tips at x=24 and x=76
      PIR text: centered at y=87
  -->

  <!-- Outer diamond frame -->
  <polygon
    points="50,4 87,40 50,64 13,40"
    fill="none"
    stroke="#7EC8E3"
    stroke-width="4"
    stroke-linejoin="miter"
    filter="url(#glow)"
  />

  <!-- Vertical axis: top vertex → top of eye, and bottom of eye → bottom vertex -->
  <!-- Top segment: (50,4) to (50,27) — stops where eye upper arc begins -->
  <line x1="50" y1="4"  x2="50" y2="27" stroke="#7EC8E3" stroke-width="2.8"/>
  <!-- Bottom segment: (50,53) to (50,64) — from where eye lower arc ends -->
  <line x1="50" y1="53" x2="50" y2="64" stroke="#7EC8E3" stroke-width="2.8"/>

  <!--
    Eye shape: almond centered at (50,40).
    Tips at (24,40) and (76,40); arcs peak at y=27 (top) and y=53 (bottom).
  -->
  <path d="M 24,40 Q 50,22 76,40 Q 50,58 24,40 Z"
        fill="none"
        stroke="#7EC8E3"
        stroke-width="3.2"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Iris ring -->
  <circle cx="50" cy="40" r="9.5"
          fill="none"
          stroke="#7EC8E3"
          stroke-width="2.8"
          filter="url(#glow)"/>

  <!-- Pupil — filled dot -->
  <circle cx="50" cy="40" r="4.5" fill="#7EC8E3"/>

  <!-- PIR text -->
  <text x="50" y="88"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="20"
        letter-spacing="3.5"
        text-anchor="middle"
        fill="#7EC8E3"
        filter="url(#glow)">PIR</text>

</svg>
